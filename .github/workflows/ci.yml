name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          # Key the cache off pyproject.toml (always present). Avoids the
          # "no file matched **/uv.lock" failure when no lockfile is committed.
          cache-dependency-glob: "pyproject.toml"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Lint
        run: |
          uv run ruff check src tests scripts
          uv run ruff format --check src tests scripts

      - name: Type check
        run: uv run mypy

      - name: Tests
        run: uv run pytest
