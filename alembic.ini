# Alembic config. The DB URL is injected at runtime from settings (see migrations/env.py),
# so it is intentionally NOT hardcoded here.
[alembic]
script_location = src/infrastructure/database/migrations
prepend_sys_path = .
path_separator = os
# Run each migration in its own transaction (safer with enum/type changes).
transaction_per_migration = true

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
